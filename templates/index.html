<!DOCTYPE html>
<html>

<head>
    <title>Smart Study Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">
        <h2>🎓 Smart Study Planner</h2>

        <form method="POST">

            <!-- STEP 1 -->
            <div class="step active" id="step1">
                <h3>Select Branch</h3>
                <select name="branch" required>
                    <option value="">-- Select Branch --</option>
                    <option value="CSE">CSE</option>
                    <option value="ECE">ECE</option>
                    <option value="ME">ME</option>
                    <option value="CE">CE</option>
                </select>
                <button type="button" onclick="nextStep(1)">Next</button>
            </div>

            <!-- STEP 2 -->
            <div class="step" id="step2">
                <h3>Select Semester</h3>
                <select name="semester" required>
                    <option value="">-- Select Semester --</option>
                    <option value="1">Sem 1</option>
                    <option value="2">Sem 2</option>
                    <option value="3">Sem 3</option>
                    <option value="4">Sem 4</option>
                </select>
                <button type="button" onclick="nextStep(2)">Next</button>
            </div>

            <!-- STEP 3 -->
            <div class="step" id="step3">
                <h3>Select Subject</h3>
                <select name="subject">
                    <option value="DSA">DSA</option>
                    <option value="OOP">OOP</option>
                    <option value="DBMS">DBMS</option>
                </select>
                <button type="button" onclick="nextStep(3)">Next</button>
            </div>

            <!-- STEP 4 -->
            <div class="step" id="step4">
                <h3>Study Details</h3>
                <input type="number" name="hours" placeholder="Hours per day" required>
                <input type="number" name="days" placeholder="Number of days" required>

                <select name="difficulty" required>
                    <option value="">-- Select Difficulty --</option>
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>

                <select name="goal" required>
                    <option value="">-- Select Goal --</option>
                    <option value="revision">Revision</option>
                    <option value="exam">Exam Preparation</option>
                </select>

                <button type="submit">Generate Plan</button>
            </div>

        </form>

        <!-- RESULT SECTION -->
        <p>🤖 AI is generating your personalized study plan...</p>
        {% if plan %}
        <form method="GET">
            <button type="submit">🔄 Start Again</button>
        </form>
        <div class="result-card">
            <h3>📅 Your Study Plan</h3>

            <ul>
                {% for p in plan %}
                <li>{{ p }}</li>
                {% endfor %}
            </ul>

            <div class="score-box">
                <h2>🎯 Predicted Score</h2>
                <p>{{ prediction }}</p>
            </div>
        </div>
        {% endif %}

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
